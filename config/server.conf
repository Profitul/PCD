// StegaPNG server configuration (libconfig format)
// Precedenta: CLI > env (STEGA_*) > acest fisier > default compilat

server: {
    user_port      = 9090;
    admin_port     = 9091;
    worker_count   = 3;
    unix_socket_path = "/tmp/stegapng_user.sock";
    log_path       = "logs/server.log";
    storage_root   = "storage";
    max_upload_mb  = 64L;
};
